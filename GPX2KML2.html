  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("selfile");
    const themeToggle = document.getElementById("themeToggle");
    const bulbOn = document.getElementById("bulbOn");
    const bulbOff = document.getElementById("bulbOff");
    const statsPanel = document.getElementById("statsPanel");
    const readTxt = document.getElementById("read_txt");
    const wrtTxt = document.getElementById("wrt_txt");
    const saveKmlButton = document.getElementById("saveKmlButton");
    const resetSettingsButton = document.getElementById("resetSettingsButton");
    const elevationCanvas = document.getElementById("elevationCanvas");

    let loadedFileName = "";
    let generatedKml = "";

    function setCookie(name, value, days) {
      const maxAge = days * 24 * 60 * 60;
      document.cookie = `${name}=${encodeURIComponent(value)}; path=/; max-age=${maxAge}; SameSite=Lax`;
    }

    function getCookie(name) {
      const key = `${name}=`;
      const parts = document.cookie.split(";");
      for (let i = 0; i < parts.length; i++) {
        const item = parts[i].trim();
        if (item.startsWith(key)) {
          return decodeURIComponent(item.substring(key.length));
        }
      }
      return null;
    }

    function setTheme(mode) {
      if (mode === "light") {
        document.body.classList.add("light-mode");
        bulbOn.classList.remove("hidden");
        bulbOff.classList.add("hidden");
      } else {
        document.body.classList.remove("light-mode");
        bulbOn.classList.add("hidden");
        bulbOff.classList.remove("hidden");
      }
      setCookie("gpx2kml_theme", mode, 365);
    }

    function escapeXml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function parseTrkPoints(gpxText) {
      const regex = /<trkpt\b[^>]*lat=["']([^"']+)["'][^>]*lon=["']([^"']+)["'][^>]*>([\s\S]*?)<\/trkpt>/gi;
      const points = [];
      let match;
      while ((match = regex.exec(gpxText)) !== null) {
        const lat = parseFloat(match[1]);
        const lon = parseFloat(match[2]);
        const body = match[3] || "";
        if (Number.isFinite(lat) && Number.isFinite(lon)) {
          const eleMatch = body.match(/<ele>([^<]+)<\/ele>/i);
          const ele = eleMatch ? parseFloat(eleMatch[1]) : 0;
          points.push({ lat, lon, ele: Number.isFinite(ele) ? ele : 0 });
        }
      }
      return points;
    }

    function updateStats(gpxText, points) {
      const trackCount = (gpxText.match(/<trk>/gi) || []).length;
      const pointCount = points.length;
      let distanceKm = 0;
      let ascentM = 0;
      for (let i = 1; i < points.length; i++) {
        const p1 = points[i - 1];
        const p2 = points[i];
        distanceKm += haversineKm(p1.lat, p1.lon, p2.lat, p2.lon);
        const diff = p2.ele - p1.ele;
        if (diff > 0) ascentM += diff;
      }
      document.getElementById("statTrackCount").textContent = `${trackCount} 本`;
      document.getElementById("statPointCount").textContent = `${pointCount.toLocaleString()} 点`;
      document.getElementById("statDistance").textContent = `${distanceKm.toFixed(2)} km`;
      document.getElementById("statAscent").textContent = `${Math.round(ascentM).toLocaleString()} m`;
    }

    function resetStats() {
      document.getElementById("statTrackCount").textContent = "-";
      document.getElementById("statPointCount").textContent = "-";
      document.getElementById("statDistance").textContent = "-";
      document.getElementById("statAscent").textContent = "-";
    }

    function drawElevationProfile(points) {
      if (!elevationCanvas || !points || points.length < 2) return;

      const rect = elevationCanvas.getBoundingClientRect();
      const width = Math.max(480, Math.floor(rect.width || 640));
      const height = 180;
      elevationCanvas.width = width;
      elevationCanvas.height = height;

      const ctx = elevationCanvas.getContext("2d");
      ctx.clearRect(0, 0, width, height);

      const bg = ctx.createLinearGradient(0, 0, width, height);
      bg.addColorStop(0, "rgba(34,211,238,0.18)");
      bg.addColorStop(1, "rgba(16,185,129,0.14)");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      let cumulative = 0;
      const distances = [0];
      const elevations = [points[0].ele ?? 0];
      for (let i = 1; i < points.length; i++) {
        cumulative += haversineKm(points[i - 1].lat, points[i - 1].lon, points[i].lat, points[i].lon);
        distances.push(cumulative);
        elevations.push(Number.isFinite(points[i].ele) ? points[i].ele : 0);
      }

      const maxDist = Math.max(...distances, 1);
      let minElev = Math.min(...elevations);
      let maxElev = Math.max(...elevations);
      if (minElev === maxElev) {
        minElev -= 1;
        maxElev += 1;
      }

      const pad = { top: 12, right: 12, bottom: 24, left: 40 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;

      ctx.strokeStyle = "rgba(148,163,184,0.35)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + (plotH * i) / 4;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
      }

      ctx.beginPath();
      for (let i = 0; i < points.length; i++) {
        const x = pad.left + (distances[i] / maxDist) * plotW;
        const y = pad.top + ((maxElev - elevations[i]) / (maxElev - minElev)) * plotH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(34,211,238,0.95)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "rgba(148,163,184,0.95)";
      ctx.font = "11px 'JetBrains Mono', monospace";
      ctx.textAlign = "left";
      ctx.fillText(`${Math.round(maxElev)}m`, 4, pad.top + 8);
      ctx.fillText(`${Math.round(minElev)}m`, 4, pad.top + plotH);
      ctx.textAlign = "right";
      ctx.fillText(`${maxDist.toFixed(1)}km`, width - 4, height - 6);
    }

    function clearElevationProfile() {
      if (!elevationCanvas) return;
      const ctx = elevationCanvas.getContext("2d");
      const rect = elevationCanvas.getBoundingClientRect();
      const width = Math.max(480, Math.floor(rect.width || 640));
      const height = 180;
      elevationCanvas.width = width;
      elevationCanvas.height = height;
      ctx.clearRect(0, 0, width, height);
    }

    function byteToHex2(n) {
      return ("0" + Math.max(0, Math.min(255, n | 0)).toString(16)).slice(-2);
    }

    function htmlColorToKmlAabbggrr(hex) {
      if (!hex || typeof hex !== "string" || hex[0] !== "#" || hex.length < 7) return "ff0000ff";
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      if ([r, g, b].some((x) => Number.isNaN(x))) return "ff0000ff";
      return "ff" + byteToHex2(b) + byteToHex2(g) + byteToHex2(r);
    }

    function randomKmlAabbggrr() {
      return "ff" +
        byteToHex2(Math.floor(Math.random() * 256)) +
        byteToHex2(Math.floor(Math.random() * 256)) +
        byteToHex2(Math.floor(Math.random() * 256));
    }

    function getLineStyleForKml() {
      const checked = document.querySelector('input[name="lineColor"]:checked');
      let color = "ff0000ff";
      if (checked) {
        if (checked.value === "custom") {
          color = htmlColorToKmlAabbggrr(document.getElementById("colorPicker")?.value);
        } else if (checked.value === "random") {
          color = randomKmlAabbggrr();
        } else if (checked.value) {
          color = checked.value;
        }
      }
      const wEl = document.getElementById("lineWidthInput");
      let width = parseInt(wEl?.value, 10);
      if (!Number.isFinite(width)) width = 3;
      width = Math.min(10, Math.max(0, width));
      return { color, width };
    }

    function buildKml(fileBaseName, points) {
      const { color, width } = getLineStyleForKml();
      let coordinates = "";
      for (let i = 0; i < points.length; i++) {
        coordinates += `${points[i].lon},${points[i].lat},${points[i].ele} \n`;
      }
      return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <Name>${escapeXml(fileBaseName)}</Name>
  <Style id="L1">
    <LineStyle>
      <color>${color}</color>
      <width>${width}</width>
    </LineStyle>
  </Style>
  <Placemark>
    <name>${escapeXml(fileBaseName)}</name>
    <styleUrl>#L1</styleUrl>
    <LineString>
      <coordinates>
${coordinates}      </coordinates>
    </LineString>
  </Placemark>
</Document>
</kml>
`;
    }

    function regenerateKmlFromUi() {
      const gpxText = readTxt.value;
      if (!gpxText || !gpxText.includes("<gpx") || !gpxText.includes("</gpx>")) return;
      try {
        const points = parseTrkPoints(gpxText);
        if (points.length < 2) return;
        generatedKml = buildKml(loadedFileName || "track", points);
        wrtTxt.value = generatedKml;
      } catch (_) {}
    }

    function resetUiSettings() {
      document.querySelectorAll('input[name="lineColor"]').forEach((r, i) => {
        r.checked = i === 0;
      });
      const cp = document.getElementById("colorPicker");
      if (cp) cp.value = "#ff0000";
      const lw = document.getElementById("lineWidthInput");
      if (lw) lw.value = 3;
      document.querySelectorAll('input[name="trackEdge"]').forEach((r, i) => {
        r.checked = i === 2;
      });
      document.querySelectorAll('input[name="waypoint"]').forEach((r, i) => {
        r.checked = i === 1;
      });
      document.querySelectorAll('input[name="dist"]').forEach((r, i) => {
        r.checked = i === 0;
      });
      const di = document.getElementById("distMarkerInterval");
      if (di) di.value = 1;
      document.querySelectorAll('input[name="simplify"]').forEach((r, i) => {
        r.checked = i === 0;
      });
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => resolve(String(event.target?.result || ""));
        reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました。"));
        reader.readAsText(file);
      });
    }

    function processGpxText(file, gpxText, updateUi) {
      if (!gpxText.includes("<gpx") || !gpxText.includes("</gpx>")) {
        throw new Error("有効なGPXファイルではありません。");
      }

      const points = parseTrkPoints(gpxText);
      if (points.length < 2) {
        throw new Error("トラックポイントが不足しているため変換できません。");
      }

      const fileBaseName = file.name.replace(/\.[^.]+$/, "") || "track";
      const kml = buildKml(fileBaseName, points);

      if (updateUi) {
        readTxt.value = gpxText;
        updateStats(gpxText, points);
        drawElevationProfile(points);
        loadedFileName = fileBaseName;
        generatedKml = kml;
        wrtTxt.value = kml;
      }

      return { fileBaseName, kml };
    }

    async function processSingleFile(file) {
      const gpxText = await readFileAsText(file);
      return processGpxText(file, gpxText, true);
    }

    function downloadKml(name, kmlText) {
      const blob = new Blob([kmlText], { type: "text/plain" });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${name}.kml`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    function safeFileName(name) {
      return String(name).replace(/[<>:"/\\|?*]/g, "_");
    }

    async function downloadZip(zipName, entries) {
      if (!window.JSZip) {
        throw new Error("ZIPライブラリの読み込みに失敗しました。");
      }
      const zip = new JSZip();
      const usedNames = new Set();
      for (let i = 0; i < entries.length; i++) {
        let base = safeFileName(entries[i].name || `track_${i + 1}`);
        if (!base) base = `track_${i + 1}`;
        let fileName = `${base}.kml`;
        let n = 1;
        while (usedNames.has(fileName)) {
          fileName = `${base}(${n}).kml`;
          n++;
        }
        usedNames.add(fileName);
        zip.file(fileName, entries[i].kml);
      }

      const blob = await zip.generateAsync({ type: "blob" });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${safeFileName(zipName) || "gpx2kml_batch"}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    async function processBatchFiles(files) {
      const progress = document.getElementById("batchProgress");
      const status = document.getElementById("batchStatus");
      const fill = document.getElementById("progressFill");

      progress.classList.remove("hidden");
      let done = 0;
      const total = files.length;
      const results = [];
      fill.style.width = "0%";
      status.textContent = `0 / ${total} ファイル処理中...`;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        try {
          const gpxText = await readFileAsText(file);
          const result = processGpxText(file, gpxText, i === files.length - 1);
          results.push({ name: result.fileBaseName, kml: result.kml });
        } catch (e) {
          // エラー時は処理継続し、最終的に件数を表示
        } finally {
          done++;
          const percent = Math.round((done / total) * 100);
          fill.style.width = `${percent}%`;
          status.textContent = `${done} / ${total} ファイル処理中...`;
          await new Promise((r) => setTimeout(r, 120));
        }
      }

      if (results.length > 0) {
        status.textContent = `ZIP作成中...`;
        await downloadZip(`gpx2kml_${new Date().toISOString().slice(0, 10)}`, results);
      }

      status.textContent = `${done} / ${total} ファイル処理完了`;
      setTimeout(() => {
        progress.classList.add("hidden");
      }, 600);
    }

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("border-cyan-300", "bg-cyan-500/10");
    });
    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("border-cyan-300", "bg-cyan-500/10");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("border-cyan-300", "bg-cyan-500/10");
      if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 1) {
          processBatchFiles(files).catch(() => {});
        } else {
          processSingleFile(files[0]).catch((err) => {
            alert(err.message || "処理に失敗しました。");
            resetStats();
            clearElevationProfile();
            wrtTxt.value = "";
            generatedKml = "";
          });
        }
      }
    });

    fileInput.addEventListener("change", () => {
      const progress = document.getElementById("batchProgress");
      if (!fileInput.files || fileInput.files.length === 0) {
        progress.classList.add("hidden");
        return;
      }
      if (fileInput.files.length > 1) {
        progress.classList.remove("hidden");
        processBatchFiles(Array.from(fileInput.files)).catch(() => {});
      } else {
        progress.classList.add("hidden");
        processSingleFile(fileInput.files[0]).catch((err) => {
          alert(err.message || "処理に失敗しました。");
          resetStats();
          clearElevationProfile();
          wrtTxt.value = "";
          generatedKml = "";
        });
      }
    });

    saveKmlButton.addEventListener("click", () => {
      if (!generatedKml) {
        alert("先にGPXファイルを読み込んでください。");
        return;
      }
      downloadKml(loadedFileName || "track", generatedKml);
    });

    resetSettingsButton?.addEventListener("click", () => {
      resetUiSettings();
      regenerateKmlFromUi();
    });

    ["lineColor", "trackEdge", "waypoint", "dist", "simplify"].forEach((name) => {
      document.querySelectorAll(`input[name="${name}"]`).forEach((el) => {
        el.addEventListener("change", regenerateKmlFromUi);
      });
    });
    document.getElementById("colorPicker")?.addEventListener("input", regenerateKmlFromUi);
    const lineWidthEl = document.getElementById("lineWidthInput");
    lineWidthEl?.addEventListener("input", regenerateKmlFromUi);
    lineWidthEl?.addEventListener("change", regenerateKmlFromUi);
    document.getElementById("distMarkerInterval")?.addEventListener("change", regenerateKmlFromUi);

    const savedTheme = getCookie("gpx2kml_theme") || "light";
    setTheme(savedTheme);
    themeToggle.addEventListener("click", () => {
      const nextTheme = document.body.classList.contains("light-mode") ? "dark" : "light";
      setTheme(nextTheme);
    });

    readTxt.value = "";
    wrtTxt.value = "";
    resetStats();
    clearElevationProfile();
  </script>
</body>
</html>
