<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPX2KML Tailwind Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Plus Jakarta Sans", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"]
          },
          colors: {
            brand: {
              50: "#ecfeff",
              100: "#cffafe",
              400: "#22d3ee",
              500: "#06b6d4",
              600: "#0891b2"
            }
          },
          boxShadow: {
            soft: "0 10px 40px rgba(2, 6, 23, 0.08)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute -top-24 -left-24 h-80 w-80 rounded-full bg-cyan-400/20 blur-3xl"></div>
    <div class="absolute top-1/3 -right-20 h-72 w-72 rounded-full bg-violet-500/20 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-64 w-64 rounded-full bg-emerald-400/15 blur-3xl"></div>
  </div>

  <main class="relative mx-auto max-w-7xl space-y-6 px-4 py-6 lg:px-8">
    <section class="rounded-3xl border border-white/10 bg-white/[0.06] p-6 shadow-soft backdrop-blur-xl">
      <div class="mb-5 flex flex-wrap items-center justify-between gap-3 border-b border-white/10 pb-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.2em] text-cyan-300/90">Tailwind Prototype</p>
          <h1 class="mt-1 text-2xl font-extrabold tracking-tight md:text-3xl">GPX→KML 変換ツール</h1>
        </div>
        <span class="rounded-full border border-cyan-300/40 bg-cyan-400/10 px-3 py-1 text-xs font-semibold text-cyan-200">2026 UI検証版</span>
      </div>

      <div id="dropZone" class="group rounded-2xl border-2 border-dashed border-white/20 bg-slate-900/50 p-8 text-center transition duration-200 hover:border-cyan-300/60 hover:bg-slate-900/70">
        <p class="text-lg font-bold">GPXファイルをドロップ / 選択</p>
        <p class="mt-1 text-sm text-slate-300">この画面はデザイン評価用です（変換ロジックは未接続）</p>
        <input id="selfile" type="file" multiple accept=".gpx"
          class="mx-auto mt-5 block w-full max-w-md cursor-pointer rounded-xl border border-white/20 bg-slate-900/70 p-2 text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-cyan-500 file:px-3 file:py-2 file:text-sm file:font-semibold file:text-slate-950 hover:file:bg-cyan-400">
      </div>

      <div id="batchProgress" class="mt-4 hidden rounded-2xl border border-amber-300/40 bg-amber-400/10 p-4">
        <p class="text-sm font-semibold text-amber-200">一括変換中...</p>
        <div class="mt-2 h-2.5 w-full overflow-hidden rounded-full bg-slate-800">
          <div id="progressFill" class="h-full w-1/3 rounded-full bg-gradient-to-r from-amber-300 to-orange-400 transition-all"></div>
        </div>
        <p id="batchStatus" class="mt-2 text-sm text-amber-100">2 / 6 ファイル処理中...</p>
      </div>
    </section>

    <section class="grid gap-6 xl:grid-cols-3">
      <div class="xl:col-span-2 space-y-6">
        <section class="grid gap-6 lg:grid-cols-2">
          <div class="rounded-2xl border border-white/10 bg-white/[0.05] p-5 shadow-soft backdrop-blur">
            <h2 class="mb-3 text-xs font-bold uppercase tracking-[0.15em] text-slate-300">入力ファイル（GPX）</h2>
            <textarea class="h-52 w-full rounded-xl border border-white/10 bg-slate-900/70 p-3 font-mono text-xs text-slate-300" readonly>&lt;gpx&gt; ... &lt;/gpx&gt;</textarea>
          </div>
          <div class="rounded-2xl border border-white/10 bg-white/[0.05] p-5 shadow-soft backdrop-blur">
            <h2 class="mb-3 text-xs font-bold uppercase tracking-[0.15em] text-slate-300">出力ファイル（KML）</h2>
            <textarea class="h-52 w-full rounded-xl border border-white/10 bg-slate-900/70 p-3 font-mono text-xs text-slate-300" readonly>&lt;kml&gt; ... &lt;/kml&gt;</textarea>
          </div>
        </section>

        <section class="rounded-2xl border border-cyan-300/20 bg-cyan-300/5 p-5 shadow-soft backdrop-blur">
          <h3 class="mb-4 text-lg font-bold text-cyan-200">GPXファイル統計情報</h3>
          <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
            <div class="rounded-xl border border-white/10 bg-slate-900/60 p-3">
              <p class="text-xs text-slate-400">トラック数</p>
              <p class="text-xl font-bold">3 本</p>
            </div>
            <div class="rounded-xl border border-white/10 bg-slate-900/60 p-3">
              <p class="text-xs text-slate-400">総ポイント数</p>
              <p class="text-xl font-bold">12,842 点</p>
            </div>
            <div class="rounded-xl border border-white/10 bg-slate-900/60 p-3">
              <p class="text-xs text-slate-400">総距離</p>
              <p class="text-xl font-bold">42.7 km</p>
            </div>
            <div class="rounded-xl border border-white/10 bg-slate-900/60 p-3">
              <p class="text-xs text-slate-400">累積登り</p>
              <p class="text-xl font-bold">1,450 m</p>
            </div>
          </div>
          <div class="mt-4 rounded-xl border border-white/10 bg-slate-900/60 p-4">
            <p class="mb-2 text-sm font-semibold text-slate-300">標高プロファイル（UIプレビュー）</p>
            <div class="h-28 rounded-lg bg-gradient-to-r from-cyan-500/40 via-violet-400/40 to-emerald-400/40"></div>
          </div>
        </section>
      </div>

      <section class="rounded-2xl border border-white/10 bg-white/[0.05] p-6 shadow-soft backdrop-blur">
        <div class="space-y-5 text-sm">
          <div>
            <h4 class="mb-2 font-bold text-slate-200">ライン色</h4>
            <div class="flex flex-wrap items-center gap-2">
              <label class="rounded-lg border border-white/10 bg-slate-900/60 px-2 py-1"><input type="radio" name="lineColor" checked> 赤</label>
              <label class="rounded-lg border border-white/10 bg-slate-900/60 px-2 py-1"><input type="radio" name="lineColor"> 青</label>
              <label class="rounded-lg border border-white/10 bg-slate-900/60 px-2 py-1"><input type="radio" name="lineColor"> 紫</label>
              <label class="rounded-lg border border-white/10 bg-slate-900/60 px-2 py-1"><input type="radio" name="lineColor"> 黒</label>
              <label class="rounded-lg border border-white/10 bg-slate-900/60 px-2 py-1"><input type="radio" name="lineColor"> ランダム</label>
              <label class="rounded-lg border border-white/10 bg-slate-900/60 px-2 py-1"><input type="radio" name="lineColor"> カスタム</label>
              <input type="color" value="#ef4444" class="h-9 w-12 rounded-lg border border-white/20 bg-slate-900">
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="text-slate-300">太さ</span>
              <input type="number" min="0" max="10" value="3" class="w-20 rounded-lg border border-white/20 bg-slate-900/80 px-2 py-1">
            </div>
          </div>

          <div>
            <h4 class="mb-2 font-bold text-slate-200">トラック端マーカー</h4>
            <div class="space-y-1 text-slate-300">
              <label class="block"><input type="radio" name="trackEdge"> 全て表示</label>
              <label class="block"><input type="radio" name="trackEdge"> 始点と終点のみ</label>
              <label class="block"><input type="radio" name="trackEdge" checked> 表示しない</label>
            </div>
          </div>

          <div>
            <h4 class="mb-2 font-bold text-slate-200">ウェイポイント</h4>
            <div class="space-y-1 text-slate-300">
              <label class="block"><input type="radio" name="waypoint"> 表示する</label>
              <label class="block"><input type="radio" name="waypoint" checked> 表示しない</label>
            </div>
          </div>

          <div>
            <h4 class="mb-2 font-bold text-slate-200">距離マーカー</h4>
            <div class="space-y-1 text-slate-300">
              <label class="block"><input type="radio" name="dist" checked> 表示しない</label>
              <label class="block"><input type="radio" name="dist"> 1kmごと</label>
              <label class="block"><input type="radio" name="dist"> 2kmごと</label>
              <label class="block"><input type="radio" name="dist"> 5kmごと</label>
              <label class="mt-1 inline-flex items-center gap-2"><input type="radio" name="dist"> カスタム <input type="number" value="1" step="0.1" class="w-20 rounded-lg border border-white/20 bg-slate-900/80 px-2 py-1"> km</label>
            </div>
          </div>

          <div>
            <h4 class="mb-2 font-bold text-slate-200">ポイント間引き</h4>
            <div class="space-y-1 text-slate-300">
              <label class="block"><input type="radio" name="simplify" checked> 間引きしない</label>
              <label class="block"><input type="radio" name="simplify"> 2点ごと</label>
              <label class="block"><input type="radio" name="simplify"> 3点ごと</label>
              <label class="block"><input type="radio" name="simplify"> 5点ごと</label>
              <label class="block"><input type="radio" name="simplify"> 10点ごと</label>
            </div>
          </div>

          <div class="pt-2">
            <button class="mb-2 w-full rounded-xl border border-white/20 bg-white/5 px-4 py-2 font-semibold hover:bg-white/10">設定をリセット</button>
            <button class="w-full rounded-xl bg-gradient-to-r from-emerald-400 to-cyan-400 px-4 py-2 font-bold text-slate-950 hover:brightness-110">変換したKMLファイルを保存</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("selfile");

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("border-cyan-300", "bg-cyan-500/10");
    });
    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("border-cyan-300", "bg-cyan-500/10");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("border-cyan-300", "bg-cyan-500/10");
    });
    fileInput.addEventListener("change", () => {
      const progress = document.getElementById("batchProgress");
      if (fileInput.files && fileInput.files.length > 1) {
        progress.classList.remove("hidden");
      } else {
        progress.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
