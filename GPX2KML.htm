<script>

var obj1 = document.getElementById("selfile");
var readTxt = ""; // 入力ファイルの文字列
var writeFilNam = ""; // 拡張子無しファイル名
var writeTex = ""; // 出力ファイル用文字列
var pointer = 0; // 検索用ポインタ
var trkpArr = [0, ""]; // trkptArr = [pointer, "lon,lat,ele"]
var flgErr1 = 1; // エラーフラグ
var WpList = []; // ウェイポイント(地名)配列 [ [ name, lat, lon ], ... ]
var statsData = {}; // 統計情報データ
var globalTrkNamArr = []; // トラック名配列（ファイル名生成用）
var trkNamArr = []; // トラック名配列（ファイル名生成用）


//ファイル読み込み（ダイアログでファイルが選択かドロップされた時）
const dropZone = document.getElementById("dropZone");
dropZone.addEventListener("dragover", event => {
	event.preventDefault();
	event.dataTransfer.dropEffect = "copy";
	dropZone.classList.add("dragover");
});
dropZone.addEventListener("dragleave", event => {
	event.preventDefault();
	dropZone.classList.remove("dragover");
});
dropZone.addEventListener("drop", event => {
   event.preventDefault();
   dropZone.classList.remove("dragover");
   var files = event.dataTransfer.files;
   getFiles(files);
});
function getFiles(files){
	if (files.length === 0) return;
	
	// 複数ファイルの場合は一括処理
	if (files.length > 1) {
		batchConvertFiles(files);
		return;
	}
	
	// 単一ファイルの処理
	for (let file of files){
		var reader = new FileReader();
		reader.readAsText(file); 
		reader.onload = event => {
			readTxt = event.target.result;
			writeFilNam = file.name.split(".")[0];
			after_file_read(readTxt, writeFilNam);
		}
	}
}
// ファイル選択ボタン入力
var obj1 = document.getElementById("selfile");
obj1.addEventListener("change",function(evt){
	var files = evt.target.files;
	if (files.length === 0) return;
	
	// 複数ファイルの場合は一括処理
	if (files.length > 1) {
		batchConvertFiles(files);
		return;
	}
	
	// 単一ファイルの処理
	var input = files[0];
	var reader = new FileReader();  // FileReaderの作成
	reader.readAsText(input);  // テキスト形式で読み込む
	// 読込終了後
	reader.onload = function(){
		readTxt = reader.result; // 読み込んだテキストを readTxt に入れる
		writeFilNam = input.name.split( "." )[0];
		after_file_read(readTxt, writeFilNam);
	 }
},false);

function after_file_read(readTxt, writeFilNam){
	document.entFil.read_txt.value = readTxt;  //テキストエリアに表示
	// グローバル変数をリセット
	window.trkNamArr = [];
	let fieChk = 0;
	pointer = readTxt.indexOf("</gpx>");
	( pointer !== -1 ) ? fieChk = fieChk: fieChk++;
	pointer = readTxt.indexOf("<gpx");
	( pointer !== -1 ) ? fieChk = fieChk: fieChk++;
	if (fieChk === 0 ){
		make_Wplist(readTxt); // v20
		make_Wplist_byYR(readTxt); // v20
		calculateStats(readTxt); // 統計情報を計算
		displayStats(); // 統計情報を表示
		mke_KLM(); // KMLを生成
		
		// KMLが正常に生成されたか確認
		if (writeTex !== "" && writeTex.indexOf("</kml>") !== -1) {
			flgErr1 = 0;
			// 保存ボタンを表示
			let saveButtonBottom = document.getElementById("saveButtonBottom");
			if (saveButtonBottom) {
				saveButtonBottom.style.display = "block";
			}
		} else {
			alert("エラー: KMLファイルの生成に失敗しました。\nGPXファイルの内容を確認してください。");
			flgErr1 = 1;
			hideStats();
			// 保存ボタンを非表示
			let saveButtonBottom = document.getElementById("saveButtonBottom");
			if (saveButtonBottom) {
				saveButtonBottom.style.display = "none";
			}
		}
	}else{
		alert("エラー: 有効なGPXファイルではありません。\nGPXファイルの形式を確認してください。");
		flgErr1 = 1;
		hideStats();
		// 保存ボタンを非表示
		let saveButtonBottom = document.getElementById("saveButtonBottom");
		if (saveButtonBottom) {
			saveButtonBottom.style.display = "none";
		}
	}
}


function get_trkptLLE(entStr, pointer){
// 文字列entStrのpinterの位置から<trkptを検索しtrkptの経度、緯度、標高、地名を"Lon,Lat,Ele,strName"の文字列で返す
// 見つからない時pointerは-1、文字列はブランク。<ele>のデータが無い時はブランク
	pointer = entStr.indexOf("<trkpt",pointer);
	let strDat, strEle;
	if (pointer === -1){ return trkpArr = [pointer, ""]; }
	let trkptStr = entStr.substring(pointer, entStr.indexOf("</trkpt>",pointer)+8);
	let Latpt = trkptStr.indexOf("lat=");
	let Lonpt = trkptStr.indexOf("lon=");
	let strLat = trkptStr.substring( Latpt+5, trkptStr.indexOf('"', Latpt+5) );
	let strLon = trkptStr.substring( Lonpt+5, trkptStr.indexOf('"', Lonpt+5) );
	if ( trkptStr.indexOf("<ele>") != -1){
		strEle = trkptStr.substring(trkptStr.indexOf("<ele>")+5,trkptStr.indexOf("</ele>"));
		strDat = strLon +","+ strLat +","+ strEle;
	}else{
		strDat = strLon +","+ strLat +"," + 0; // v20 カシミール3dエラー対策
	}
	return trkpArr = [pointer, strDat];
}

// 距離マーカーを生成する関数
function generateDistanceMarkers(trkStr, trackName, intervalKm) {
	let points = [];
	let pointer = 0;
	
	// トラックポイントをすべて取得
	do {
		get_trkptLLE(trkStr, pointer + 1);
		pointer = trkpArr[0];
		if (pointer !== -1) {
			let coords = trkpArr[1].split(',');
			if (coords.length >= 2) {
				points.push({
					lon: parseFloat(coords[0]),
					lat: parseFloat(coords[1]),
					ele: coords.length >= 3 ? parseFloat(coords[2]) : 0
				});
			}
		}
	} while (pointer !== -1);
	
	if (points.length < 2) return;
	
	// 距離マーカーのスタイル定義（初回のみ）
	if (!writeTex.includes('Style id="DistMarker"')) {
		writeTex += '  <Style id="DistMarker">\n    <IconStyle>\n      <Icon>\n';
		writeTex += '        <href>https://maps.gsi.go.jp/portal/sys/v4/symbols/dot.png</href>\n      </Icon>\n';
		writeTex += '      <scale>1.2</scale>\n    </IconStyle>\n    <LabelStyle>\n      <scale>0.8</scale>\n    </LabelStyle>\n  </Style>\n';
	}
	
	// 累積距離を計算しながらマーカーを配置
	let cumulativeDistance = 0; // km
	let nextMarkerDistance = intervalKm;
	let prevPoint = points[0];
	
	for (let i = 1; i < points.length; i++) {
		let currentPoint = points[i];
		
		// 2点間の距離を計算（ハーバーサイン公式）
		let dLat = (currentPoint.lat - prevPoint.lat) * Math.PI / 180;
		let dLon = (currentPoint.lon - prevPoint.lon) * Math.PI / 180;
		let a = Math.sin(dLat/2) * Math.sin(dLat/2) +
		        Math.cos(prevPoint.lat * Math.PI / 180) * Math.cos(currentPoint.lat * Math.PI / 180) *
		        Math.sin(dLon/2) * Math.sin(dLon/2);
		let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
		let segmentDistance = 6371 * c; // km
		
		cumulativeDistance += segmentDistance;
		
		// 次のマーカー位置に到達したかチェック
		if (cumulativeDistance >= nextMarkerDistance) {
			// マーカーを配置
			let markerName = nextMarkerDistance.toFixed(1) + "km";
			if (nextMarkerDistance >= 1 && nextMarkerDistance % 1 === 0) {
				markerName = Math.round(nextMarkerDistance) + "km";
			}
			
			writeTex += '  <Placemark>\n    <name>' + markerName + '</name>\n';
			writeTex += '    <styleUrl>#DistMarker</styleUrl>\n';
			writeTex += '    <Point>\n      <altitudeMode>relativeToGround</altitudeMode>\n';
			writeTex += '      <coordinates>' + currentPoint.lon + ',' + currentPoint.lat + ',' + currentPoint.ele + '</coordinates>\n';
			writeTex += '    </Point>\n  </Placemark>\n';
			
			nextMarkerDistance += intervalKm;
		}
		
		prevPoint = currentPoint;
	}
}

function mke_KLM() {
 	if ( readTxt === "" ){ 
		writeTex = ""; // エラー時は空にする
		return; 
	}
	
	// writeTexを初期化（前回のデータをクリア）
	writeTex = "";
	
	let LinWid = document.getElementById("WoL").value; // ライン幅
	let LinColor = getLineColor(); // ラインカラー（カスタム色対応）
	let iconSet = document.selbttn2.Icon.value; // トラック始終マーカー(アイコン)表示
	let WpIcon = document.selbttn3.Icon2.value; // 地名マーカー有無
	let WpSmb = document.selbttn4.Icon3.value; // ウェイポイントシンボル V21
	let distMarker = document.selbttn5.DistanceMarker.value; // 距離マーカー設定
	let distMarkerInterval = 0; // 距離マーカーの間隔（km）
	if (distMarker === "off") {
		distMarkerInterval = 0;
	} else if (distMarker === "custom") {
		distMarkerInterval = parseFloat(document.getElementById("distMarkerInterval").value) || 1;
	} else {
		distMarkerInterval = parseFloat(distMarker) || 1;
	}
	let simplifyInterval = parseInt(document.selbttn6.Simplify.value) || 1; // 間引き間隔
	if (simplifyInterval === 0 || isNaN(simplifyInterval)) {
		simplifyInterval = 1; // デフォルト値
	}

  // ヘッダとラインスタイルの記述
	writeTex = '<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n';
	writeTex += '  <Name>' + writeFilNam + '</Name>\n';
	writeTex += '  <Style id="L1">\n    <LineStyle>\n      <color>' + LinColor + '</color>\n';
	writeTex += '      <width>' + LinWid + '</width>\n';
	writeTex += '    </LineStyle>\n  </Style>\n';
  // ウェイポイント(地名)の記述 v20
	if (WpList.length != 0 && WpIcon === "on" ){
		writeTex += '  <Style id="WpIcon">\n    <IconStyle>\n      <Icon>\n';
		writeTex += '        <href>https://maps.gsi.go.jp/portal/sys/v4/symbols/' + WpSmb + '</href>\n      </Icon>\n';
		writeTex += '    <scale>1.0</scale>\n    </IconStyle>\n  </Style>\n';
		for ( let i = 0; i < WpList.length ; i++ ){
			writeTex += '  <Placemark>\n    <name>' + WpList[ i ][0] + '</name>\n';
			writeTex += '      <styleUrl>#WpIcon</styleUrl>\n';
			writeTex += '    <Point>\n      <altitudeMode>relativeToGround</altitudeMode>\n';
			writeTex += '      <coordinates>' + WpList[ i ][2] + ',' + WpList[ i ][1] + '</coordinates>\n';
			writeTex += '    </Point>\n   </Placemark>\n';
		}
	}
 // トラック数をチェックしトラック名とナンバーの配列を作成
	pointer = 0;
	let NofTrk = 0, Pointer2 = 0; // V2.2
	let trkName = "", NumName = ""
	let trkNamArr = [], NumArr =[];
	do {
		pointer = readTxt.indexOf("<trk>", pointer +1);
		pointer2 = readTxt.indexOf("<trk>", pointer +1); // V2.2
		if ( pointer !== -1 ) {
			NofTrk++;
			pointer = readTxt.indexOf("<name>", pointer);
			(pointer !== -1) ? trkName = readTxt.substring( pointer +6, readTxt.indexOf("</name>",pointer) ): trkName = "";
			trkNamArr.push(trkName);
			// グローバル変数にも保存（ファイル名生成用）
			if (!window.trkNamArr) {
				window.trkNamArr = [];
			}
			window.trkNamArr.push(trkName);
			// グローバル変数にも保存（ファイル名生成用）
			if (typeof window.trkNamArr === 'undefined') {
				window.trkNamArr = [];
			}
			window.trkNamArr.push(trkName);		
			let pointerNum = readTxt.indexOf("<number>", pointer); // V2.2
			if ((pointerNum < pointer2) || (pointer2 == -1)) { // V2.2
				if (pointerNum !== -1) {
					NumName = readTxt.substring( pointerNum +8, readTxt.indexOf("</number>",pointerNum));
					pointer = pointerNum;
				}else{ 
					NumName ="";
				} 
			}else{ 
				NumName ="";
			} 
			NumArr.push(NumName); NumName ="";
		}
	} while ( pointer !== -1 );
	
	// トラックが見つからない場合はエラー
	if (NofTrk === 0) {
		writeTex = ""; // KMLをクリア
		return;
	}

  // 各トラックのマーカー設定判定用フラグ配列
	let trkFlg = "";
	let trkFlgArr =[];
	if ( NofTrk === 1){
		trkFlgArr.push("b");
	}else{
		for ( let i = 0; i < NofTrk; i++ ) {
			trkFlg = "b";
			if ( i + 1 < NofTrk && trkNamArr[i] === trkNamArr[i+1] ){
					trkFlg = "s";
					if ( i != 0 && trkNamArr[i] === trkNamArr[i-1] ){
						trkFlg = "m";
					}
			}else if ( i != 0 &&  trkNamArr[i] === trkNamArr[i-1] ){
				trkFlg = "e";
			}
			if ( i + 1 == NofTrk ){
				( trkNamArr[i] === trkNamArr[i-1] ) ? trkFlg = "e": trkFlg = trkFlg;
			}
			trkFlgArr.push(trkFlg);
		}
	}
  // トラック名が同じ場合は<number>の値を付加したものをトラック名とする
	for ( let i = 0; i < NofTrk; i++ ) {
		if ( trkFlgArr[i] != "b" ){
			trkNamArr[i] = trkNamArr[i] + NumArr[i];
		}
	}

 // 1トラック分の文字列を切り出し、その文字列からマーカーとラインデータの記述を作成
	pointer = 0;
	for (let i = 0; i < NofTrk; i++ ) {
		pointer = readTxt.indexOf("<trk>", pointer +1);
		let strTrk = readTxt.substring( pointer, readTxt.indexOf("</trk>",pointer) );
  // トラック始終マーカー記述
		if ( iconSet !== "no" ){
			get_trkptLLE(strTrk, 0);
			let strIcSp = trkpArr[1];
			get_trkptLLE( strTrk, strTrk.lastIndexOf( "<trkpt" ) -1 );
			let strIcEp = trkpArr[1];
			if ( iconSet == "all" || trkFlgArr[i] == "s" || trkFlgArr[i] == "b" ){
				writeTex += '  <Placemark>\n    <name>' + trkNamArr[i] + ' Start</name>\n';
				writeTex += '    <Point>\n      <altitudeMode>relativeToGround</altitudeMode>\n';
				writeTex += '      <coordinates>' + strIcSp + '</coordinates>\n';
				writeTex += '    </Point>\n   </Placemark>\n';
			}
			if ( iconSet == "all" || trkFlgArr[i] == "e" || trkFlgArr[i] == "b" ){
				writeTex += '  <Placemark>\n    <name>' + trkNamArr[i] + ' End</name>\n';
				writeTex += '    <Point>\n      <altitudeMode>relativeToGround</altitudeMode>\n';
				writeTex += '      <coordinates>' + strIcEp + '</coordinates>\n';
				writeTex += '    </Point>\n   </Placemark>\n';
			}
		}
		
		// 距離マーカーの生成
		if (distMarkerInterval > 0) {
			generateDistanceMarkers(strTrk, trkNamArr[i], distMarkerInterval);
		}
		
 // ラインの記述
		writeTex += '  <Placemark>\n    <name>' + trkNamArr[i] + '</name>\n';
		writeTex += '    <styleUrl>#L1</styleUrl>\n    <LineString>\n      <altitudeMode></altitudeMode>\n      <coordinates>\n';
		let SubPointer = 0;
		let pointCount = 0;
		do { // ライン用緯度経度文字列生成
			get_trkptLLE(strTrk, SubPointer +1 );
			SubPointer = trkpArr[0];
			if ( SubPointer !== -1 ){
				// 間引き処理：最初のポイント、最後のポイント、指定間隔のポイントのみ出力
				if (simplifyInterval <= 1 || pointCount === 0 || 
				    (pointCount % simplifyInterval === 0) ||
				    (SubPointer === strTrk.lastIndexOf("<trkpt"))) {
					writeTex +=  trkpArr[1] + " \n";
				}
				pointCount++;
			}
		} while ( SubPointer !== -1 );
		writeTex += '      </coordinates>\n    </LineString>\n  </Placemark>\n';
	}
 // フッター
	writeTex += '</Document>\n</kml>\n';
	document.exprtFil.wrt_txt.value = writeTex;  //KML文字列をテキストエリアに表示
}


function saveFile() {
// ファイル出力
	// 統計情報パネルが表示されている場合は、GPXファイルは読み込まれている
	let statsPanel = document.getElementById("statsPanel");
	let isStatsVisible = statsPanel && statsPanel.style.display !== "none";
	
	// より確実なエラーチェック
	if (readTxt === "" || writeFilNam === "") {
		alert("エラー: 有効なGPXファイルが読み込まれていません。\n先にGPXファイルを選択してください。"); 
		return;
	}
	
	// KMLが生成されていない、または不完全な場合は再生成を試みる
	if (writeTex === "" || writeTex.indexOf("</kml>") === -1) {
		if (readTxt !== "" && (isStatsVisible || flgErr1 == 0)) {
			mke_KLM();
			// 再生成後も空の場合はエラー
			if (writeTex === "" || writeTex.indexOf("</kml>") === -1) {
				alert("エラー: KMLファイルの生成に失敗しました。\nGPXファイルの形式を確認してください。"); 
				return;
			}
		} else {
			alert("エラー: 有効なGPXファイルが読み込まれていません。\n先にGPXファイルを選択してください。"); 
			return;
		}
	}
	
	// ファイル名を生成（GPXの名前_地名.kml）
	let trackName = "";
	if (window.trkNamArr && window.trkNamArr.length > 0) {
		// 最初のトラック名を使用（複数トラックがある場合は最初のもの）
		trackName = window.trkNamArr[0];
		// トラック名が空の場合はデフォルト名を使用
		if (trackName === "") {
			trackName = "track";
		}
	} else {
		// トラック名が取得できない場合はデフォルト名を使用
		trackName = "track";
	}
	// ファイル名に使用できない文字を置換
	trackName = trackName.replace(/[<>:"/\\|?*]/g, "_");
	let title = writeFilNam + "_" + trackName + ".kml"; // 出力ファイル名
	let stringObject = new Blob( [writeTex], { type: "text/plain" } );
	let objectURL = window.URL.createObjectURL( stringObject );
	
	// 上部のボタンと下部のボタンの両方を更新
	let linkTagTop = document.getElementById( "getLocalTop" );
	let linkTagBottom = document.getElementById( "getLocal" );
	
	if (linkTagTop) {
		linkTagTop.setAttribute( "href", objectURL );
		linkTagTop.setAttribute( "download", title );
	}
	if (linkTagBottom) {
		linkTagBottom.setAttribute( "href", objectURL );
		linkTagBottom.setAttribute( "download", title );
	}
}


// WP付GPX読み込み時のマーカーリスト作成(v20)
function make_Wplist(entStr){
	WpList = [], pointer = 0;
	let nnn = 0;
	do{
		nnn++; if (nnn > 50) {break;} // 異常時ループ脱出
		pointer = entStr.indexOf("<wpt", pointer);
		if ( pointer != -1 ){
			let Latpt = entStr.indexOf( "lat=",  pointer);
			let Lonpt = entStr.indexOf( "lon=", pointer );
			let LatStr = entStr.substring( Latpt+5, entStr.indexOf('"', Latpt + 5) );
			let LonStr = entStr.substring( Lonpt+5, entStr.indexOf('"', Lonpt + 5) );
			let nameStr = entStr.substring( entStr.indexOf( "<name>", pointer  ) + 6, entStr.indexOf( "</name>", pointer  ) );
			WpList.push( [nameStr, LatStr, LonStr] );
			pointer = Lonpt;
		}
	} while ( pointer != -1 );
}

// ヤマレコ地名付GPX読み込み時のマーカーリスト作成(v20)
function make_Wplist_byYR(entStr){
	if ( WpList.length != 0 ){ return; }
	WpList = [];	pointer = 0;	let nnn = 0;
	while ( nnn < 100 ){
		pointer = entStr.indexOf("<trkpt",pointer);
		if (pointer === -1){ break; }
		let trkptStr = entStr.substring(pointer, entStr.indexOf("</trkpt>",pointer)+8);
		if ( trkptStr.indexOf("<name>") != -1 ){
			let Latpt = trkptStr.indexOf("lat=");
			let Lonpt = trkptStr.indexOf("lon=");
			let strLat = trkptStr.substring( Latpt+5, trkptStr.indexOf('"', Latpt+5) );
			let strLon = trkptStr.substring( Lonpt+5, trkptStr.indexOf('"', Lonpt+5) );
			let strName = trkptStr.substring(trkptStr.indexOf("<name>")+6, trkptStr.indexOf("</name>"));
			strName = strName.split("[")[0]; // 読み仮名カット
			let dupNameFlg = 0;
		 	for ( let i = 0; i < WpList.length ; i++ ){ if ( WpList[ i ][0] ===  strName ){ dupNameFlg = 1; } }
			if ( dupNameFlg === 0 ){ WpList.push( [ strName, parseFloat(strLat), parseFloat(strLon) ] ); }
			nnn++;
		}
		pointer ++;
	}
}

// 統計情報を計算する関数
function calculateStats(gpxText) {
	let stats = {
		trackCount: 0,
		totalPoints: 0,
		waypointCount: WpList.length,
		minElevation: null,
		maxElevation: null,
		totalDistance: 0,
		startTime: null,
		endTime: null,
		averageSpeed: null,
		maxSpeed: null,
		totalAscent: 0,
		totalDescent: 0
	};

	// トラック数をカウント
	let trkPointer = 0;
	do {
		trkPointer = gpxText.indexOf("<trk>", trkPointer + 1);
		if (trkPointer !== -1) {
			stats.trackCount++;
		}
	} while (trkPointer !== -1);

	// トラックポイントを解析
	let pointPointer = 0;
	let prevLat = null, prevLon = null, prevEle = null, prevTime = null;
	let points = [];
	let speeds = [];
	let totalTimeSeconds = 0;

	do {
		pointPointer = gpxText.indexOf("<trkpt", pointPointer);
		if (pointPointer !== -1) {
			stats.totalPoints++;
			let trkptStr = gpxText.substring(pointPointer, gpxText.indexOf("</trkpt>", pointPointer) + 8);
			
			// 緯度経度を取得
			let latMatch = trkptStr.match(/lat=["']([^"']+)["']/);
			let lonMatch = trkptStr.match(/lon=["']([^"']+)["']/);
			
			let lat = null, lon = null, ele = null, timeStr = null;
			
			if (latMatch && lonMatch) {
				lat = parseFloat(latMatch[1]);
				lon = parseFloat(lonMatch[1]);
				points.push({lat: lat, lon: lon});
				
				// 距離を計算（ハーバーサイン公式）
				if (prevLat !== null && prevLon !== null) {
					let dLat = (lat - prevLat) * Math.PI / 180;
					let dLon = (lon - prevLon) * Math.PI / 180;
					let a = Math.sin(dLat/2) * Math.sin(dLat/2) +
					        Math.cos(prevLat * Math.PI / 180) * Math.cos(lat * Math.PI / 180) *
					        Math.sin(dLon/2) * Math.sin(dLon/2);
					let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
					let distance = 6371 * c; // 地球の半径6371km
					stats.totalDistance += distance;
					
					// 速度を計算（時間データがある場合）
					if (prevTime !== null) {
						let timeMatch = trkptStr.match(/<time>([^<]+)<\/time>/);
						if (timeMatch) {
							timeStr = timeMatch[1];
							let currentTime = new Date(timeStr);
							let prevTimeDate = new Date(prevTime);
							if (!isNaN(currentTime.getTime()) && !isNaN(prevTimeDate.getTime())) {
								let timeDiff = (currentTime - prevTimeDate) / 1000; // 秒
								if (timeDiff > 0 && timeDiff < 3600) { // 1時間以内の移動のみ
									let speed = (distance * 1000) / timeDiff; // m/s
									speed = speed * 3.6; // km/hに変換
									if (speed < 200) { // 異常値を除外（200km/h以下）
										speeds.push(speed);
										if (stats.maxSpeed === null || speed > stats.maxSpeed) {
											stats.maxSpeed = speed;
										}
									}
									totalTimeSeconds += timeDiff;
								}
							}
						}
					}
				}
				prevLat = lat;
				prevLon = lon;
			}
			
			// 標高を取得
			let eleMatch = trkptStr.match(/<ele>([^<]+)<\/ele>/);
			if (eleMatch) {
				ele = parseFloat(eleMatch[1]);
				if (stats.minElevation === null || ele < stats.minElevation) {
					stats.minElevation = ele;
				}
				if (stats.maxElevation === null || ele > stats.maxElevation) {
					stats.maxElevation = ele;
				}
				
				// 登り/下りの標高差を計算
				if (prevEle !== null) {
					let elevDiff = ele - prevEle;
					if (elevDiff > 0) {
						stats.totalAscent += elevDiff;
					} else if (elevDiff < 0) {
						stats.totalDescent += Math.abs(elevDiff);
					}
				}
				prevEle = ele;
			}
			
			// 時刻を取得
			let timeMatch = trkptStr.match(/<time>([^<]+)<\/time>/);
			if (timeMatch) {
				timeStr = timeMatch[1];
				if (stats.startTime === null) {
					stats.startTime = timeStr;
				}
				stats.endTime = timeStr;
				prevTime = timeStr;
			}
			
			pointPointer++;
		}
	} while (pointPointer !== -1 && pointPointer < gpxText.length);
	
	// 平均速度を計算
	if (stats.totalDistance > 0 && totalTimeSeconds > 0) {
		stats.averageSpeed = (stats.totalDistance / totalTimeSeconds) * 3600; // km/h
	} else if (speeds.length > 0) {
		// 各セグメントの速度から平均を計算
		let sum = 0;
		for (let i = 0; i < speeds.length; i++) {
			sum += speeds[i];
		}
		stats.averageSpeed = sum / speeds.length;
	}

	// 標高プロファイル用のデータを準備
	stats.elevationProfile = [];
	let pointPointer2 = 0;
	let maxSamples = 500; // 最大500サンプル
	let sampleCount = 0;
	let totalPoints = 0;
	
	// まず総ポイント数をカウント
	let tempPointer = 0;
	while (tempPointer !== -1 && tempPointer < gpxText.length) {
		tempPointer = gpxText.indexOf("<trkpt", tempPointer);
		if (tempPointer !== -1) {
			totalPoints++;
			tempPointer++;
		}
	}
	
	let sampleInterval = Math.max(1, Math.floor(totalPoints / maxSamples));
	
	// 標高データをサンプリング
	pointPointer2 = 0;
	while (pointPointer2 !== -1 && pointPointer2 < gpxText.length && sampleCount < maxSamples) {
		pointPointer2 = gpxText.indexOf("<trkpt", pointPointer2);
		if (pointPointer2 !== -1) {
			let trkptStr = gpxText.substring(pointPointer2, gpxText.indexOf("</trkpt>", pointPointer2) + 8);
			let eleMatch = trkptStr.match(/<ele>([^<]+)<\/ele>/);
			if (eleMatch) {
				stats.elevationProfile.push(parseFloat(eleMatch[1]));
			} else if (stats.minElevation !== null) {
				stats.elevationProfile.push(stats.minElevation);
			} else {
				stats.elevationProfile.push(0);
			}
			sampleCount++;
			// サンプリング間隔をスキップ
			for (let skip = 0; skip < sampleInterval && pointPointer2 !== -1; skip++) {
				pointPointer2 = gpxText.indexOf("<trkpt", pointPointer2 + 1);
			}
		}
	}
	
	statsData = stats;
}

// 統計情報を表示する関数
function displayStats() {
	let panel = document.getElementById("statsPanel");
	let grid = document.getElementById("statsGrid");
	let saveButtonTop = document.getElementById("saveButtonTop");
	
	if (!statsData || statsData.trackCount === 0) {
		hideStats();
		return;
	}
	
	grid.innerHTML = "";
	
	// トラック数
	addStatItem(grid, "トラック数", statsData.trackCount + " 本");
	
	// 総ポイント数
	addStatItem(grid, "総ポイント数", statsData.totalPoints.toLocaleString() + " 点");
	
	// ウェイポイント数
	if (statsData.waypointCount > 0) {
		addStatItem(grid, "ウェイポイント数", statsData.waypointCount + " 点");
	}
	
	// 総距離
	if (statsData.totalDistance > 0) {
		let distance = statsData.totalDistance;
		let distanceStr;
		if (distance < 1) {
			distanceStr = (distance * 1000).toFixed(0) + " m";
		} else {
			distanceStr = distance.toFixed(2) + " km";
		}
		addStatItem(grid, "総距離", distanceStr);
	}
	
	// 標高範囲
	if (statsData.minElevation !== null && statsData.maxElevation !== null) {
		let elevRange = statsData.maxElevation - statsData.minElevation;
		addStatItem(grid, "標高範囲", 
			statsData.minElevation.toFixed(0) + " m ～ " + 
			statsData.maxElevation.toFixed(0) + " m" +
			" (差: " + elevRange.toFixed(0) + " m)");
	}
	
	// 累積登り/下り
	if (statsData.totalAscent > 0 || statsData.totalDescent > 0) {
		let ascentStr = statsData.totalAscent >= 1000 ? 
			(statsData.totalAscent / 1000).toFixed(1) + " km" : 
			statsData.totalAscent.toFixed(0) + " m";
		let descentStr = statsData.totalDescent >= 1000 ? 
			(statsData.totalDescent / 1000).toFixed(1) + " km" : 
			statsData.totalDescent.toFixed(0) + " m";
		addStatItem(grid, "累積登り", ascentStr);
		addStatItem(grid, "累積下り", descentStr);
	}
	
	// 速度情報
	if (statsData.averageSpeed !== null && statsData.averageSpeed > 0) {
		addStatItem(grid, "平均速度", statsData.averageSpeed.toFixed(1) + " km/h");
	}
	if (statsData.maxSpeed !== null && statsData.maxSpeed > 0) {
		addStatItem(grid, "最大速度", statsData.maxSpeed.toFixed(1) + " km/h");
	}
	
	// 時刻範囲
	if (statsData.startTime && statsData.endTime) {
		let startDate = new Date(statsData.startTime);
		let endDate = new Date(statsData.endTime);
		if (!isNaN(startDate.getTime()) && !isNaN(endDate.getTime())) {
			let startStr = startDate.toLocaleString('ja-JP');
			let endStr = endDate.toLocaleString('ja-JP');
			addStatItem(grid, "記録開始", startStr);
			addStatItem(grid, "記録終了", endStr);
			
			// 経過時間
			let duration = (endDate - startDate) / 1000 / 60; // 分
			if (duration > 0) {
				let hours = Math.floor(duration / 60);
				let minutes = Math.floor(duration % 60);
				let durationStr = hours > 0 ? hours + "時間" + minutes + "分" : minutes + "分";
				addStatItem(grid, "記録時間", durationStr);
			}
		}
	}
	
	panel.style.display = "block";
	panel.classList.add("active");
	
	// 上部の保存ボタンも表示
	if (saveButtonTop) {
		saveButtonTop.style.display = "block";
	}
	
	// 標高プロファイルを描画
	drawElevationProfile();
}

function addStatItem(grid, label, value) {
	let item = document.createElement("div");
	item.className = "stat-item";
	item.innerHTML = '<div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div>';
	grid.appendChild(item);
}

function hideStats() {
	let panel = document.getElementById("statsPanel");
	let saveButtonTop = document.getElementById("saveButtonTop");
	let elevationProfile = document.getElementById("elevationProfile");
	panel.style.display = "none";
	panel.classList.remove("active");
	
	// 上部の保存ボタンも非表示
	if (saveButtonTop) {
		saveButtonTop.style.display = "none";
	}
	
	// 標高プロファイルも非表示
	if (elevationProfile) {
		elevationProfile.style.display = "none";
	}
}

// 標高プロファイルを描画する関数
function drawElevationProfile() {
	let canvas = document.getElementById("elevationCanvas");
	let profileDiv = document.getElementById("elevationProfile");
	
	if (!canvas || !statsData || !statsData.elevationProfile || statsData.elevationProfile.length < 2) {
		if (profileDiv) {
			profileDiv.style.display = "none";
		}
		return;
	}
	
	profileDiv.style.display = "block";
	
	// 少し待ってから描画（レイアウトが確定してから）
	setTimeout(() => {
		let ctx = canvas.getContext("2d");
		// 統計情報パネルの幅を取得して横幅いっぱいに表示
		let statsPanel = document.getElementById("statsPanel");
		let parentWidth = statsPanel ? (statsPanel.offsetWidth || statsPanel.clientWidth) : (profileDiv.offsetWidth || profileDiv.clientWidth || 800);
		// パディング（左右15pxずつ）を考慮
		let canvasWidth = Math.max(400, parentWidth - 30);
		canvas.style.width = "100%";
		canvas.style.maxWidth = "100%";
		let width = canvas.width = canvasWidth;
		let height = canvas.height = 200;
		
		// 背景をクリア
		ctx.clearRect(0, 0, width, height);
		ctx.fillStyle = "#f9f9f9";
		ctx.fillRect(0, 0, width, height);
		
		let elevations = statsData.elevationProfile;
		let minElev = Math.min(...elevations);
		let maxElev = Math.max(...elevations);
		let elevRange = maxElev - minElev;
		if (elevRange === 0) elevRange = 1;
		
		let padding = 40;
		let graphWidth = width - padding * 2;
		let graphHeight = height - padding * 2;
		
		// グリッド線を描画
		ctx.strokeStyle = "#e0e0e0";
		ctx.lineWidth = 1;
		for (let i = 0; i <= 5; i++) {
			let y = padding + (graphHeight / 5) * i;
			ctx.beginPath();
			ctx.moveTo(padding, y);
			ctx.lineTo(width - padding, y);
			ctx.stroke();
			
			// 標高ラベル
			let elev = maxElev - (elevRange / 5) * i;
			ctx.fillStyle = "#666";
			ctx.font = "10px sans-serif";
			ctx.textAlign = "right";
			ctx.fillText(Math.round(elev) + "m", padding - 5, y + 4);
		}
		
		// 距離ラベル
		ctx.fillStyle = "#666";
		ctx.font = "10px sans-serif";
		ctx.textAlign = "center";
		if (statsData.totalDistance > 0) {
			for (let i = 0; i <= 5; i++) {
				let x = padding + (graphWidth / 5) * i;
				let dist = (statsData.totalDistance / 5) * i;
				ctx.fillText(dist.toFixed(1) + "km", x, height - padding + 15);
			}
		}
		
		// プロファイル線を描画
		ctx.strokeStyle = "#2196F3";
		ctx.lineWidth = 2;
		ctx.beginPath();
		
		for (let i = 0; i < elevations.length; i++) {
			let x = padding + (graphWidth / (elevations.length - 1)) * i;
			let y = padding + graphHeight - ((elevations[i] - minElev) / elevRange) * graphHeight;
			
			if (i === 0) {
				ctx.moveTo(x, y);
			} else {
				ctx.lineTo(x, y);
			}
		}
		ctx.stroke();
		
		// グラフの下に塗りつぶし
		ctx.fillStyle = "rgba(33, 150, 243, 0.2)";
		ctx.lineTo(width - padding, height - padding);
		ctx.lineTo(padding, height - padding);
		ctx.closePath();
		ctx.fill();
	}, 100);
	
	// 背景をクリア
	ctx.clearRect(0, 0, width, height);
	ctx.fillStyle = "#f9f9f9";
	ctx.fillRect(0, 0, width, height);
	
	let elevations = statsData.elevationProfile;
	let minElev = Math.min(...elevations);
	let maxElev = Math.max(...elevations);
	let elevRange = maxElev - minElev;
	if (elevRange === 0) elevRange = 1;
	
	let padding = 40;
	let graphWidth = width - padding * 2;
	let graphHeight = height - padding * 2;
	
	// グリッド線を描画
	ctx.strokeStyle = "#e0e0e0";
	ctx.lineWidth = 1;
	for (let i = 0; i <= 5; i++) {
		let y = padding + (graphHeight / 5) * i;
		ctx.beginPath();
		ctx.moveTo(padding, y);
		ctx.lineTo(width - padding, y);
		ctx.stroke();
		
		// 標高ラベル
		let elev = maxElev - (elevRange / 5) * i;
		ctx.fillStyle = "#666";
		ctx.font = "10px sans-serif";
		ctx.textAlign = "right";
		ctx.fillText(Math.round(elev) + "m", padding - 5, y + 4);
	}
	
	// 距離ラベル
	ctx.fillStyle = "#666";
	ctx.font = "10px sans-serif";
	ctx.textAlign = "center";
	if (statsData.totalDistance > 0) {
		for (let i = 0; i <= 5; i++) {
			let x = padding + (graphWidth / 5) * i;
			let dist = (statsData.totalDistance / 5) * i;
			ctx.fillText(dist.toFixed(1) + "km", x, height - padding + 15);
		}
	}
	
	// プロファイル線を描画
	ctx.strokeStyle = "#2196F3";
	ctx.lineWidth = 2;
	ctx.beginPath();
	
	for (let i = 0; i < elevations.length; i++) {
		let x = padding + (graphWidth / (elevations.length - 1)) * i;
		let y = padding + graphHeight - ((elevations[i] - minElev) / elevRange) * graphHeight;
		
		if (i === 0) {
			ctx.moveTo(x, y);
		} else {
			ctx.lineTo(x, y);
		}
	}
	ctx.stroke();
	
	// グラフの下に塗りつぶし
	ctx.fillStyle = "rgba(33, 150, 243, 0.2)";
	ctx.lineTo(width - padding, height - padding);
	ctx.lineTo(padding, height - padding);
	ctx.closePath();
	ctx.fill();
}

// カラーピッカー関連の関数
function updateColorFromPicker() {
	let colorPicker = document.getElementById("colorPicker");
	let color = colorPicker.value;
	// HTMLカラーコードをKML形式（AABBGGRR）に変換
	let r = parseInt(color.substr(1, 2), 16);
	let g = parseInt(color.substr(3, 2), 16);
	let b = parseInt(color.substr(5, 2), 16);
	let kmlColor = "ff" + 
		("0" + b.toString(16)).slice(-2) +
		("0" + g.toString(16)).slice(-2) +
		("0" + r.toString(16)).slice(-2);
	
	// カスタムラジオボタンを選択
	document.getElementById("colorCustomRadio").checked = true;
	document.getElementById("colorCustomRadio").value = kmlColor;
	
	mke_KLM();
	saveSettings();
}

// 新しいランダム色を生成する関数
function generateNewRandomColor() {
	let randomRadio = document.getElementById("colorRandomRadio");
	if (!randomRadio || !randomRadio.checked) {
		return;
	}
	
	// 新しいランダム色を生成
	let r = Math.floor(Math.random() * 256);
	let g = Math.floor(Math.random() * 256);
	let b = Math.floor(Math.random() * 256);
	let htmlColor = "#" + 
		("0" + r.toString(16)).slice(-2) +
		("0" + g.toString(16)).slice(-2) +
		("0" + b.toString(16)).slice(-2);
	document.getElementById("colorPicker").value = htmlColor;
	
	// 生成したランダム色をKML形式で保存
	let kmlColor = "ff" + 
		("0" + b.toString(16)).slice(-2) +
		("0" + g.toString(16)).slice(-2) +
		("0" + r.toString(16)).slice(-2);
	randomRadio.setAttribute("data-random-color", kmlColor);
	
	// KMLを再生成して設定を保存
	mke_KLM();
	saveSettings();
}

function updateColorFromRadio() {
	let selected = document.querySelector('input[name="color1"]:checked');
	if (!selected) {
		mke_KLM();
		saveSettings();
		return;
	}
	
	if (selected.value === "random") {
		// ランダム色が選択された場合、ランダム色を生成してカラーピッカーに表示
		generateNewRandomColor();
	} else if (selected.value !== "custom") {
		// プリセット色が選択された場合、カラーピッカーを更新
		let kmlColor = selected.value;
		// KML形式（AABBGGRR）からHTMLカラーコード（#RRGGBB）に変換
		let r = parseInt(kmlColor.substr(6, 2), 16);
		let g = parseInt(kmlColor.substr(4, 2), 16);
		let b = parseInt(kmlColor.substr(2, 2), 16);
		let htmlColor = "#" + 
			("0" + r.toString(16)).slice(-2) +
			("0" + g.toString(16)).slice(-2) +
			("0" + b.toString(16)).slice(-2);
		document.getElementById("colorPicker").value = htmlColor;
	}
	mke_KLM();
	saveSettings();
}

function getLineColor() {
	// ラジオボタンの選択種別に関わらず、常にカラーピッカーの色を使用
	let colorPicker = document.getElementById("colorPicker");
	let color = colorPicker.value;
	let r = parseInt(color.substr(1, 2), 16);
	let g = parseInt(color.substr(3, 2), 16);
	let b = parseInt(color.substr(5, 2), 16);
	return "ff" + 
		("0" + b.toString(16)).slice(-2) +
		("0" + g.toString(16)).slice(-2) +
		("0" + r.toString(16)).slice(-2);
}

// 設定の保存/読み込み機能
function saveSettings() {
	let selectedColor = document.querySelector('input[name="color1"]:checked');
	let lineColorMode = selectedColor ? selectedColor.value : "ff0000ff";
	let colorPickerValue = document.getElementById("colorPicker").value;
	
	// ランダム色が選択されている場合、現在のランダム色を保存
	let randomColorValue = null;
	if (lineColorMode === "random" && selectedColor) {
		// ランダム色を生成（保存時に決定）
		let r = Math.floor(Math.random() * 256);
		let g = Math.floor(Math.random() * 256);
		let b = Math.floor(Math.random() * 256);
		randomColorValue = "ff" + 
			("0" + b.toString(16)).slice(-2) +
			("0" + g.toString(16)).slice(-2) +
			("0" + r.toString(16)).slice(-2);
		// 生成した色をラジオボタンに保存
		selectedColor.setAttribute("data-random-color", randomColorValue);
	}
	
	// カラーピッカーの値は常に保存（カスタム色が選択されていない場合でも、次回カスタム色を選択した時に使えるように）
	
	let settings = {
		lineColor: getLineColor(),
		lineColorMode: lineColorMode,
		colorPickerValue: colorPickerValue,
		randomColorValue: randomColorValue, // ランダム色の値を保存
		lineWidth: document.getElementById("WoL").value,
		trackIcon: document.selbttn2.Icon.value,
		waypointIcon: document.selbttn3.Icon2.value,
		waypointSymbol: document.selbttn4.Icon3.value,
		distanceMarker: document.selbttn5.DistanceMarker.value,
		distanceMarkerInterval: document.getElementById("distMarkerInterval").value,
		simplify: document.selbttn6.Simplify.value
	};
	
	try {
		localStorage.setItem('gpx2kml_settings', JSON.stringify(settings));
	} catch (e) {
		console.error('設定の保存に失敗しました:', e);
	}
}

function loadSettings(showMessage) {
	// showMessageがtrueの場合のみメッセージを表示（手動読み込み時）
	// 自動読み込み時（初回起動時）はfalseで呼び出される
	try {
		let saved = localStorage.getItem('gpx2kml_settings');
		if (saved) {
			let settings = JSON.parse(saved);
			
			// カラー設定
			if (settings.lineColorMode === "custom") {
				// カスタム色が選択されていた場合
				// まず他のラジオボタンの選択を解除
				let allColorRadios = document.querySelectorAll('input[name="color1"]');
				allColorRadios.forEach(radio => radio.checked = false);
				
				// カスタムラジオボタンを選択
				let customRadio = document.getElementById("colorCustomRadio");
				if (customRadio) {
					customRadio.checked = true;
				} else {
					// フォールバック: value="custom"のラジオボタンを探す
					let customRadioByValue = document.querySelector('input[name="color1"][value="custom"]');
					if (customRadioByValue) {
						customRadioByValue.checked = true;
					}
				}
				
				// カラーピッカーの値を復元
				if (settings.colorPickerValue) {
					document.getElementById("colorPicker").value = settings.colorPickerValue;
				} else {
					document.getElementById("colorPicker").value = "#ff0000";
				}
				
				// KMLを再生成
				mke_KLM();
			} else if (settings.lineColorMode === "random") {
				// ランダム色が選択されていた場合
				// まず他のラジオボタンの選択を解除
				let allColorRadios = document.querySelectorAll('input[name="color1"]');
				allColorRadios.forEach(radio => radio.checked = false);
				
				// ランダムラジオボタンを選択
				let randomRadio = document.getElementById("colorRandomRadio");
				if (randomRadio) {
					randomRadio.checked = true;
					// 保存されたランダム色を復元
					if (settings.randomColorValue) {
						randomRadio.setAttribute("data-random-color", settings.randomColorValue);
					}
				} else {
					// フォールバック: value="random"のラジオボタンを探す
					let randomRadioByValue = document.querySelector('input[name="color1"][value="random"]');
					if (randomRadioByValue) {
						randomRadioByValue.checked = true;
						if (settings.randomColorValue) {
							randomRadioByValue.setAttribute("data-random-color", settings.randomColorValue);
						}
					}
				}
				
				// KMLを再生成
				mke_KLM();
			} else {
				// プリセット色が選択されていた場合
				let radio = document.querySelector('input[name="color1"][value="' + settings.lineColorMode + '"]');
				if (radio) {
					radio.checked = true;
					updateColorFromRadio();
				}
				// カラーピッカーの値は常に復元（カスタム色が選択されていない場合でも、次回カスタム色を選択した時に使えるように）
				if (settings.colorPickerValue) {
					document.getElementById("colorPicker").value = settings.colorPickerValue;
				}
			}
			
			// ライン幅
			if (settings.lineWidth) {
				document.getElementById("WoL").value = settings.lineWidth;
			}
			
			// トラック端マーカー
			if (settings.trackIcon) {
				let radio = document.querySelector('input[name="Icon"][value="' + settings.trackIcon + '"]');
				if (radio) radio.checked = true;
			}
			
			// ウェイポイントマーカー
			if (settings.waypointIcon) {
				let radio = document.querySelector('input[name="Icon2"][value="' + settings.waypointIcon + '"]');
				if (radio) radio.checked = true;
			}
			
			// ウェイポイントシンボル
			if (settings.waypointSymbol) {
				let radio = document.querySelector('input[name="Icon3"][value="' + settings.waypointSymbol + '"]');
				if (radio) radio.checked = true;
			}
			
			// 距離マーカー
			if (settings.distanceMarker) {
				let radio = document.querySelector('input[name="DistanceMarker"][value="' + settings.distanceMarker + '"]');
				if (radio) radio.checked = true;
				if (settings.distanceMarkerInterval) {
					document.getElementById("distMarkerInterval").value = settings.distanceMarkerInterval;
				}
			}
			
			// ポイントの間引き
			if (settings.simplify) {
				let radio = document.querySelector('input[name="Simplify"][value="' + settings.simplify + '"]');
				if (radio) radio.checked = true;
			}
			
			mke_KLM();
		}
	} catch (e) {
		console.error('設定の読み込みに失敗しました:', e);
	}
}

function resetSettings() {
	// デフォルト値に戻す
	document.querySelector('input[name="color1"][value="ff0000ff"]').checked = true;

// 複数ファイルの一括変換
function batchConvertFiles(files) {
	let progressPanel = document.getElementById("batchProgress");
	let progressFill = document.getElementById("progressFill");
	let batchStatus = document.getElementById("batchStatus");
	
	progressPanel.style.display = "block";
	
	let totalFiles = files.length;
	let processedFiles = 0;
	let kmlFiles = [];
	
	batchStatus.textContent = `0 / ${totalFiles} ファイル処理中...`;
	
	function processFile(index) {
		if (index >= totalFiles) {
			// すべてのファイル処理完了
			downloadBatchFiles(kmlFiles);
			progressPanel.style.display = "none";
			alert(`${totalFiles} 個のKMLファイルをダウンロードしました`);
			return;
		}
		
		let file = files[index];
		let reader = new FileReader();
		
		reader.onload = function(e) {
			let gpxText = e.target.result;
			
			// GPXファイルの検証
			if (gpxText.indexOf("</gpx>") === -1 || gpxText.indexOf("<gpx") === -1) {
				batchStatus.textContent = `エラー: ${file.name} は有効なGPXファイルではありません`;
				processedFiles++;
				updateProgress(processedFiles, totalFiles);
				setTimeout(() => processFile(index + 1), 500);
				return;
			}
			
			// 一時的にグローバル変数を保存
			let originalReadTxt = readTxt;
			let originalWriteFilNam = writeFilNam;
			
			// ファイルを処理
			readTxt = gpxText;
			writeFilNam = file.name.split(".")[0];
			
			make_Wplist(readTxt);
			make_Wplist_byYR(readTxt);
			mke_KLM();
			
			// KMLデータを保存
			kmlFiles.push({
				name: writeFilNam + ".kml",
				content: writeTex
			});
			
			// 元の値を復元
			readTxt = originalReadTxt;
			writeFilNam = originalWriteFilNam;
			
			processedFiles++;
			updateProgress(processedFiles, totalFiles);
			batchStatus.textContent = `${processedFiles} / ${totalFiles} ファイル処理完了 (${file.name})`;
			
			// 次のファイルを処理
			setTimeout(() => processFile(index + 1), 100);
		};
		
		reader.onerror = function() {
			batchStatus.textContent = `エラー: ${file.name} の読み込みに失敗しました`;
			processedFiles++;
			updateProgress(processedFiles, totalFiles);
			setTimeout(() => processFile(index + 1), 500);
		};
		
		reader.readAsText(file);
	}
	
	// 最初のファイルから処理開始
	processFile(0);
}

function updateProgress(current, total) {
	let percentage = Math.round((current / total) * 100);
	let progressFill = document.getElementById("progressFill");
	progressFill.style.width = percentage + "%";
	progressFill.textContent = percentage + "%";
}

function downloadBatchFiles(kmlFiles) {
	// 各KMLファイルを個別にダウンロード
	for (let i = 0; i < kmlFiles.length; i++) {
		setTimeout(() => {
			let file = kmlFiles[i];
			let blob = new Blob([file.content], { type: "text/plain" });
			let url = window.URL.createObjectURL(blob);
			let a = document.createElement("a");
			a.href = url;
			a.download = file.name;
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
			window.URL.revokeObjectURL(url);
		}, i * 200); // 200ms間隔でダウンロード
	}
}
